<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Products – Swiftly</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f6f6;color:#111;min-height:100vh}
nav{background:#000;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-.5px}.logo span{color:#FF6B35}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-btn{background:none;border:1px solid #333;color:#fff;border-radius:20px;padding:7px 16px;font-size:.82rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.nav-btn:hover,.nav-btn.active{background:#fff;color:#000;border-color:#fff}
.nav-btn-orange{background:#FF6B35;border-color:#FF6B35;color:#fff;font-weight:700}
.nav-btn-orange:hover{background:#e55a28;border-color:#e55a28;color:#fff}
.lang-mini{display:flex;gap:2px}
.lm{background:none;border:none;color:#666;font-size:.72rem;cursor:pointer;padding:3px 5px;border-radius:4px}
.lm:hover,.lm.active{background:#222;color:#fff}
main{max-width:960px;margin:0 auto;padding:28px 24px 80px}
/* STORE SETTINGS */
.settings-card{background:#fff;border-radius:16px;padding:24px;border:1px solid #f0f0f0;margin-bottom:24px}
.sc-title{font-size:.75rem;font-weight:700;color:#FF6B35;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sf{display:flex;flex-direction:column;gap:5px}
.sf label{font-size:.75rem;font-weight:600;color:#444}
.sf input,.sf select{border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 13px;font-size:.88rem;outline:none;transition:border-color .2s}
.sf input:focus,.sf select:focus{border-color:#000}
.sf-full{grid-column:1/-1}
.emoji-preview{font-size:2.4rem;width:54px;height:54px;border:1.5px solid #e0e0e0;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.emoji-row{display:flex;align-items:center;gap:10px}
.save-settings-btn{background:#000;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;font-size:.85rem;cursor:pointer}
.save-settings-btn:hover{background:#222}
/* PRODUCT GRID */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-head h1{font-size:1.2rem;font-weight:800}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.prod-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #f0f0f0;position:relative}
.prod-card-img{height:100px;background:#f6f6f6;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.prod-card-body{padding:12px}
.pcb-name{font-weight:700;font-size:.9rem;margin-bottom:2px}
.pcb-desc{font-size:.72rem;color:#aaa;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pcb-foot{display:flex;justify-content:space-between;align-items:center}
.pcb-price{font-weight:800;font-size:.95rem}
.pcb-actions{display:flex;gap:5px}
.act-btn{border:none;background:#f0f0f0;border-radius:8px;padding:5px 9px;font-size:.75rem;cursor:pointer;font-weight:600}
.act-btn:hover{background:#e0e0e0}
.act-del{background:#fff1f2;color:#be123c}
.act-del:hover{background:#fce7e7}
.avail-dot{position:absolute;top:10px;right:10px;width:9px;height:9px;border-radius:50%}
.dot-on{background:#22C55E}
.dot-off{background:#ccc}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px;padding:28px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:800;margin-bottom:18px}
.mfields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{display:flex;flex-direction:column;gap:5px}
.mf label{font-size:.75rem;font-weight:600;color:#444}
.mf input,.mf textarea,.mf select{border:1.5px solid #e0e0e0;border-radius:10px;padding:11px 13px;font-size:.88rem;outline:none;transition:border-color .2s}
.mf input:focus,.mf textarea:focus,.mf select:focus{border-color:#000}
.mf textarea{resize:none;height:66px}
.mf-full{grid-column:1/-1}
.emoji-big-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.emoji-big{font-size:2.5rem;cursor:pointer;padding:4px;border-radius:8px}
.emoji-big:hover{background:#f0f0f0}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ep{font-size:1.5rem;cursor:pointer;padding:4px;border-radius:6px}
.ep:hover{background:#f0f0f0}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-sec{flex:1;background:#f0f0f0;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer}
.btn-pri{flex:2;background:#000;color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer}
.empty{text-align:center;padding:60px;color:#ccc}
.empty .big{font-size:3rem;margin-bottom:10px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#111;color:#fff;padding:13px 24px;border-radius:12px;font-weight:600;z-index:999;transition:transform .4s;font-size:.88rem}
.toast.show{transform:translateX(-50%) translateY(0)}
.avail-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.avail-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#000}
@media(max-width:600px){.settings-grid{grid-template-columns:1fr}.mfields{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <div class="logo">Swift<span>ly</span></div>
  <div class="nav-right">
    <div class="lang-mini">
      <button class="lm active" onclick="setLang('en')">EN</button>
      <button class="lm" onclick="setLang('es')">ES</button>
      <button class="lm" onclick="setLang('fr')">FR</button>
      <button class="lm" onclick="setLang('ar')">AR</button>
      <button class="lm" onclick="setLang('hi')">HI</button>
      <button class="lm" onclick="setLang('ml')">ML</button>
    </div>
    <a href="/manager" class="nav-btn" data-i18n="dashboard">Dashboard</a>
    <button class="nav-btn nav-btn-orange" onclick="openAddModal()" data-i18n="add_product">+ Add Product</button>
    <a href="/logout" class="nav-btn" data-i18n="logout">Log out</a>
  </div>
</nav>

<main>
  <!-- Store settings -->
  <div class="settings-card">
    <div class="sc-title" data-i18n="store_settings">Store Settings</div>
    <div class="settings-grid">
      <div class="sf">
        <label data-i18n="store_name">Store name</label>
        <input type="text" id="ss-name">
      </div>
      <div class="sf">
        <label data-i18n="category">Category</label>
        <select id="ss-cat">
          <option value="food">Food</option>
          <option value="medicine">Medicine</option>
          <option value="grocery">Grocery</option>
          <option value="general">General</option>
        </select>
      </div>
      <div class="sf">
        <label data-i18n="delivery_time">Delivery time (min)</label>
        <input type="text" id="ss-dtime" placeholder="e.g. 20-35">
      </div>
      <div class="sf">
        <label data-i18n="delivery_fee">Delivery fee (£)</label>
        <input type="number" id="ss-dfee" step="0.01" min="0">
      </div>
      <div class="sf">
        <label data-i18n="store_address">Address</label>
        <input type="text" id="ss-addr">
      </div>
      <div class="sf">
        <label data-i18n="store_emoji">Store emoji</label>
        <div class="emoji-row">
          <div class="emoji-preview" id="ss-emoji-preview" onclick="toggleStoreEmojiPicker()">🏪</div>
          <input type="text" id="ss-emoji" placeholder="🏪" oninput="document.getElementById('ss-emoji-preview').textContent=this.value||'🏪'" maxlength="4" style="width:70px">
        </div>
        <div id="store-emoji-picker" style="display:none;margin-top:6px">
          <div class="emoji-grid" id="sep-grid"></div>
        </div>
      </div>
      <div class="sf sf-full">
        <label data-i18n="description">Description</label>
        <input type="text" id="ss-desc" placeholder="Brief store description...">
      </div>
    </div>
    <div style="margin-top:14px"><button class="save-settings-btn" onclick="saveStoreSettings()" data-i18n="save_settings">Save Settings</button></div>
  </div>

  <!-- Product list -->
  <div class="page-head">
    <h1 data-i18n="your_products">Your Products</h1>
    <button class="nav-btn-orange" style="border:none;border-radius:10px;padding:10px 18px;font-size:.85rem;cursor:pointer;font-weight:700" onclick="openAddModal()" data-i18n="add_product">+ Add Product</button>
  </div>
  <div class="prod-grid" id="prod-grid"></div>
</main>

<!-- PRODUCT MODAL -->
<div class="modal-bg" id="prod-modal">
  <div class="modal">
    <h2 id="pm-title" data-i18n="add_product">Add Product</h2>
    <input type="hidden" id="pm-id">
    <div class="mfields">
      <div class="mf mf-full">
        <label data-i18n="product_name">Product name</label>
        <input type="text" id="pm-name" placeholder="e.g. Margherita Pizza">
      </div>
      <div class="mf mf-full">
        <label data-i18n="description">Description</label>
        <textarea id="pm-desc" placeholder="Short description..."></textarea>
      </div>
      <div class="mf">
        <label data-i18n="price">Price (£)</label>
        <input type="number" id="pm-price" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="mf">
        <label data-i18n="emoji_or_url">Emoji or Image URL</label>
        <input type="text" id="pm-emoji" placeholder="🍕 or https://..." oninput="updateEmojiPreview()">
      </div>
      <div class="mf mf-full">
        <label data-i18n="quick_emoji">Quick pick emoji</label>
        <div class="emoji-grid" id="quick-emoji-grid"></div>
      </div>
      <div class="mf mf-full">
        <div class="avail-row">
          <input type="checkbox" id="pm-avail" checked>
          <label for="pm-avail" data-i18n="available">Available</label>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeProdModal()" data-i18n="cancel">Cancel</button>
      <button class="btn-pri" onclick="saveProd()" id="pm-save-btn" data-i18n="save">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const T={
  en:{dashboard:'Dashboard',logout:'Log out',add_product:'+ Add Product',store_settings:'Store Settings',store_name:'Store name',category:'Category',delivery_time:'Delivery time (min)',delivery_fee:'Delivery fee (£)',store_address:'Address',store_emoji:'Store emoji',description:'Description',save_settings:'Save Settings',your_products:'Your Products',product_name:'Product name',price:'Price (£)',emoji_or_url:'Emoji or Image URL',quick_emoji:'Quick pick emoji',available:'Available',cancel:'Cancel',save:'Save',edit:'Edit',delete_btn:'Delete',no_products:'No products yet. Add your first one!'},
  es:{dashboard:'Panel',logout:'Salir',add_product:'+ Añadir',store_settings:'Config. tienda',store_name:'Nombre',category:'Categoría',save_settings:'Guardar',your_products:'Tus productos',product_name:'Nombre del producto',price:'Precio (£)',available:'Disponible',cancel:'Cancelar',save:'Guardar',edit:'Editar',delete_btn:'Eliminar',no_products:'Sin productos aún.'},
  fr:{dashboard:'Tableau de bord',logout:'Déconnexion',add_product:'+ Ajouter',store_settings:'Paramètres boutique',store_name:'Nom',category:'Catégorie',save_settings:'Enregistrer',your_products:'Vos produits',product_name:'Nom du produit',price:'Prix (£)',available:'Disponible',cancel:'Annuler',save:'Enregistrer',edit:'Modifier',delete_btn:'Supprimer',no_products:'Aucun produit.'},
  ar:{dashboard:'لوحة التحكم',logout:'خروج',add_product:'+ إضافة',store_settings:'إعدادات المتجر',store_name:'اسم المتجر',save_settings:'حفظ',your_products:'منتجاتك',product_name:'اسم المنتج',price:'السعر',available:'متاح',cancel:'إلغاء',save:'حفظ',edit:'تعديل',delete_btn:'حذف'},
  hi:{dashboard:'डैशबोर्ड',logout:'लॉग आउट',add_product:'+ जोड़ें',store_settings:'स्टोर सेटिंग्स',store_name:'स्टोर का नाम',save_settings:'सेव',your_products:'आपके उत्पाद',product_name:'उत्पाद का नाम',price:'कीमत',available:'उपलब्ध',cancel:'रद्द',save:'सेव',edit:'संपादन',delete_btn:'हटाएं'},
  ml:{dashboard:'ഡാഷ്‌ബോർഡ്',logout:'ലോഗ് ഔട്ട്',add_product:'+ ചേർക്കൂ',store_settings:'സ്റ്റോർ ക്രമീകരണം',store_name:'സ്റ്റോർ പേര്',save_settings:'സേവ്',your_products:'നിങ്ങളുടെ ഉൽ‌പ്പന്നങ്ങൾ',product_name:'ഉൽ‌പ്പന്ന പേര്',price:'വില',available:'ലഭ്യം',cancel:'റദ്ദ്',save:'സേവ്',edit:'തിരുത്ത്',delete_btn:'നീക്കം'}
};
let lang=localStorage.getItem('sw_lang')||'en';
function t(k){return (T[lang]||T.en)[k]||k;}
function applyLang(){
  const tr=T[lang]||T.en;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(tr[k])el.textContent=tr[k];});
  document.querySelectorAll('.lm').forEach(b=>b.classList.remove('active'));
  const lb=document.querySelector(`.lm[onclick="setLang('${lang}')"]`);if(lb)lb.classList.add('active');
  document.getElementById('html-root').dir=lang==='ar'?'rtl':'ltr';
}
function setLang(l){lang=l;localStorage.setItem('sw_lang',l);applyLang();}

const EMOJIS=['🍕','🍔','🌮','🍜','🍣','🥗','🍰','🥤','🍺','🍝','🥩','🍗','🥘','🥙','🌯','🍱','🎂','☕','🍵','🧃','💊','💉','🩺','🧴','🧻','🛒','🥦','🥕','🍎','🍞','🥚','🧀','📦','🎁','🔧','💻','👕','🎮'];

let myStoreId=null,products=[];

async function init(){
  const r=await fetch('/api/me');const me=await r.json();
  if(me.store){
    myStoreId=me.store.id;
    document.getElementById('ss-name').value=me.store.name||'';
    document.getElementById('ss-cat').value=me.store.category||'food';
    document.getElementById('ss-dtime').value=me.store.delivery_time||'';
    document.getElementById('ss-dfee').value=me.store.delivery_fee||'';
    document.getElementById('ss-addr').value=me.store.address||'';
    document.getElementById('ss-emoji').value=me.store.emoji||'🏪';
    document.getElementById('ss-emoji-preview').textContent=me.store.emoji||'🏪';
    document.getElementById('ss-desc').value=me.store.description||'';
    loadProducts(me.store.id);
  }
  buildEmojiGrids();
  applyLang();
}
function buildEmojiGrids(){
  const qg=document.getElementById('quick-emoji-grid');
  qg.innerHTML=EMOJIS.map(e=>`<span class="ep" onclick="pickEmoji('${e}')">${e}</span>`).join('');
  const sg=document.getElementById('sep-grid');
  sg.innerHTML=EMOJIS.map(e=>`<span class="ep" onclick="pickStoreEmoji('${e}')">${e}</span>`).join('');
}
function pickEmoji(e){document.getElementById('pm-emoji').value=e;updateEmojiPreview();}
function pickStoreEmoji(e){document.getElementById('ss-emoji').value=e;document.getElementById('ss-emoji-preview').textContent=e;document.getElementById('store-emoji-picker').style.display='none';}
function toggleStoreEmojiPicker(){const p=document.getElementById('store-emoji-picker');p.style.display=p.style.display==='none'?'block':'none';}
function updateEmojiPreview(){}

async function loadProducts(sid){
  const r=await fetch(`/api/stores/${sid}/products`);
  products=await r.json();renderProducts();
}
function renderProducts(){
  const g=document.getElementById('prod-grid');
  if(!products.length){g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">📦</div><p>${t('no_products')}</p></div>`;return;}
  g.innerHTML=products.map(p=>`<div class="prod-card">
    <div class="avail-dot ${p.is_available!==false?'dot-on':'dot-off'}"></div>
    <div class="prod-card-img">${p.image_url&&p.image_url.startsWith('http')?`<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover" alt="${p.name}">`:p.emoji||p.image_url||'📦'}</div>
    <div class="prod-card-body">
      <div class="pcb-name">${p.name}</div>
      <div class="pcb-desc">${p.description||''}</div>
      <div class="pcb-foot">
        <span class="pcb-price">£${p.price.toFixed(2)}</span>
        <div class="pcb-actions">
          <button class="act-btn" onclick='editProd(${JSON.stringify(p).replace(/'/g,"\\'")})'>${t('edit')}</button>
          <button class="act-btn act-del" onclick="deleteProd(${p.id},'${p.name.replace(/'/g,"\\'")}')">✕</button>
        </div>
      </div>
    </div>
  </div>`).join('');
}

// Store settings
async function saveStoreSettings(){
  if(!myStoreId)return;
  const body={name:document.getElementById('ss-name').value,category:document.getElementById('ss-cat').value,delivery_time:document.getElementById('ss-dtime').value,delivery_fee:parseFloat(document.getElementById('ss-dfee').value)||0,address:document.getElementById('ss-addr').value,emoji:document.getElementById('ss-emoji').value||'🏪',description:document.getElementById('ss-desc').value};
  const r=await fetch(`/api/stores/${myStoreId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json();
  if(d.ok)showToast('Store settings saved ✓');else showToast(d.error||'Error');
}

// Product modal
function openAddModal(){
  document.getElementById('pm-id').value='';
  document.getElementById('pm-title').textContent=t('add_product');
  document.getElementById('pm-name').value='';
  document.getElementById('pm-desc').value='';
  document.getElementById('pm-price').value='';
  document.getElementById('pm-emoji').value='';
  document.getElementById('pm-avail').checked=true;
  document.getElementById('prod-modal').classList.add('open');
}
function editProd(p){
  document.getElementById('pm-id').value=p.id;
  document.getElementById('pm-title').textContent=t('edit');
  document.getElementById('pm-name').value=p.name||'';
  document.getElementById('pm-desc').value=p.description||'';
  document.getElementById('pm-price').value=p.price||'';
  document.getElementById('pm-emoji').value=p.emoji||p.image_url||'';
  document.getElementById('pm-avail').checked=p.is_available!==false;
  document.getElementById('prod-modal').classList.add('open');
}
function closeProdModal(){document.getElementById('prod-modal').classList.remove('open');}
async function saveProd(){
  const id=document.getElementById('pm-id').value;
  const name=document.getElementById('pm-name').value.trim();
  const price=parseFloat(document.getElementById('pm-price').value);
  if(!name){showToast('Name required');return;}
  if(isNaN(price)||price<0){showToast('Valid price required');return;}
  const emoji=document.getElementById('pm-emoji').value.trim();
  const body={name,description:document.getElementById('pm-desc').value,price,is_available:document.getElementById('pm-avail').checked,store_id:myStoreId};
  if(emoji.startsWith('http'))body.image_url=emoji;
  else body.emoji=emoji||'📦';
  let r,d;
  if(id){r=await fetch(`/api/products/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}
  else{r=await fetch('/api/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}
  d=await r.json();
  if(d.ok||d.id){closeProdModal();showToast(id?'Product updated ✓':'Product added ✓');loadProducts(myStoreId);}
  else showToast(d.error||'Error saving product');
}
async function deleteProd(id,name){
  if(!confirm(`Delete "${name}"?`))return;
  const r=await fetch(`/api/products/${id}`,{method:'DELETE'});
  const d=await r.json();
  if(d.ok){showToast('Deleted');loadProducts(myStoreId);}
  else showToast(d.error||'Error');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
init();
</script>
</body>
</html>
