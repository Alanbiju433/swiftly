<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Swiftly</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f6f6;color:#111;min-height:100vh}
/* NAV */
nav{background:#000;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-.5px}.logo span{color:#FF6B35}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-btn{background:none;border:1px solid #333;color:#fff;border-radius:20px;padding:7px 16px;font-size:.82rem;cursor:pointer;transition:all .2s}
.nav-btn:hover,.nav-btn.active{background:#fff;color:#000;border-color:#fff}
.cart-btn{background:#FF6B35;border:none;color:#fff;border-radius:20px;padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s}
.cart-btn:hover{background:#e55a28}
.cart-badge{background:rgba(0,0,0,.25);border-radius:10px;padding:1px 7px;font-size:.75rem;font-weight:800}
.lang-mini{display:flex;gap:2px}
.lm{background:none;border:none;color:#666;font-size:.72rem;cursor:pointer;padding:3px 5px;border-radius:4px}
.lm:hover,.lm.active{background:#222;color:#fff}
/* HERO */
.hero{background:#000;padding:32px 24px 28px}
.hero-inner{max-width:900px;margin:0 auto}
.hero h1{font-size:1.9rem;font-weight:800;color:#fff;margin-bottom:6px}
.hero p{color:#888;font-size:.95rem;margin-bottom:20px}
.search-wrap{display:flex;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.search-wrap input{flex:1;border:none;padding:15px 20px;font-size:1rem;outline:none;background:transparent}
.search-wrap button{background:#FF6B35;color:#fff;border:none;padding:0 24px;font-weight:700;cursor:pointer;font-size:.9rem}
/* CATEGORIES */
.cat-bar{background:#fff;border-bottom:1px solid #ebebeb;position:sticky;top:64px;z-index:90}
.cat-scroll{display:flex;gap:0;max-width:900px;margin:0 auto;overflow-x:auto;padding:0 24px}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-pill{border:none;background:none;padding:16px 20px;font-size:.88rem;font-weight:600;color:#666;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .2s}
.cat-pill:hover{color:#111}
.cat-pill.active{color:#000;border-bottom-color:#000}
/* MAIN */
main{max-width:900px;margin:0 auto;padding:24px 24px 120px}
.section-title{font-size:1.2rem;font-weight:800;margin-bottom:16px;color:#111}
/* STORE GRID */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px}
.store-card{background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid #f0f0f0}
.store-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.1)}
.store-cover{height:130px;display:flex;align-items:center;justify-content:center;font-size:4rem;background:#f6f6f6;position:relative}
.store-cover img{width:100%;height:100%;object-fit:cover}
.store-badge{position:absolute;top:10px;left:10px;background:#000;color:#fff;font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
.store-info{padding:14px 16px}
.store-name{font-size:1rem;font-weight:800;margin-bottom:4px}
.store-meta{display:flex;gap:12px;font-size:.78rem;color:#888;margin-bottom:6px}
.store-rating{color:#111;font-weight:700}
.star{color:#f59e0b;margin-right:2px}
.store-desc{font-size:.78rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* STORE VIEW */
.store-view{display:none}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;font-size:.9rem;font-weight:600;cursor:pointer;color:#111;padding:0;margin-bottom:20px}
.back-btn:hover{color:#FF6B35}
.store-hero{background:#000;border-radius:16px;padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:24px}
.store-hero-emoji{font-size:3.5rem}
.store-hero-info{flex:1}
.store-hero-name{font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:4px}
.store-hero-meta{font-size:.82rem;color:#aaa}
.store-open-badge{background:#22C55E;color:#fff;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:10px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.product-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid #f0f0f0;transition:box-shadow .2s}
.product-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.prod-img{height:110px;background:#f6f6f6;display:flex;align-items:center;justify-content:center;font-size:3rem}
.prod-body{padding:12px}
.prod-name{font-size:.9rem;font-weight:700;margin-bottom:3px}
.prod-desc{font-size:.75rem;color:#aaa;margin-bottom:10px;line-height:1.4}
.prod-foot{display:flex;justify-content:space-between;align-items:center}
.prod-price{font-size:1rem;font-weight:800;color:#111}
.add-btn{width:30px;height:30px;background:#000;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
.add-btn:hover{background:#FF6B35}
/* CART DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200}
.overlay.open{display:block}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:400px;max-width:100vw;background:#fff;z-index:201;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-head{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0}
.cart-head h2{font-size:1.1rem;font-weight:800}
.close-x{background:#f0f0f0;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.cart-items{flex:1;overflow-y:auto;padding:16px 24px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f7f7f7}
.ci-emoji{font-size:1.8rem;width:40px;text-align:center}
.ci-info{flex:1}
.ci-name{font-size:.88rem;font-weight:600}
.ci-price{font-size:.82rem;color:#888}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qb{background:#f0f0f0;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.qb:hover{background:#000;color:#fff}
.cart-empty{text-align:center;padding:60px 0;color:#ccc}
.cart-empty .big{font-size:3rem}
.cart-foot{padding:20px 24px;border-top:1px solid #f0f0f0}
.total-rows{margin-bottom:16px}
.total-row{display:flex;justify-content:space-between;font-size:.88rem;color:#666;margin-bottom:6px}
.total-row.bold{font-weight:800;color:#000;font-size:.98rem}
.checkout-btn{width:100%;background:#000;color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .2s}
.checkout-btn:hover{background:#222}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px;padding:32px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.2rem;font-weight:800;margin-bottom:20px}
.mf{margin-bottom:14px}
.mf label{display:block;font-size:.78rem;font-weight:600;color:#444;margin-bottom:5px}
.mf input,.mf textarea{width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:12px 14px;font-size:.9rem;outline:none;transition:border-color .2s}
.mf input:focus,.mf textarea:focus{border-color:#000}
.mf textarea{height:68px;resize:none}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-sec{flex:1;background:#f0f0f0;border:none;border-radius:10px;padding:13px;font-weight:600;cursor:pointer}
.btn-pri{flex:2;background:#000;color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;cursor:pointer}
/* TRACKER */
.tracker{background:#fff;border-radius:20px;padding:32px;width:480px;max-width:95vw}
.tracker-oid{font-size:.78rem;color:#aaa;margin-bottom:4px}
.steps{display:flex;flex-direction:column;gap:0}
.step{display:flex;align-items:flex-start;gap:14px;padding-bottom:22px;position:relative}
.step:last-child{padding-bottom:0}
.step::after{content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;background:#f0f0f0}
.step:last-child::after{display:none}
.step-dot{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:.85rem;z-index:1;flex-shrink:0}
.step.done .step-dot{background:#22C55E;color:#fff}
.step.active .step-dot{background:#FF6B35;color:#fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.4)}60%{box-shadow:0 0 0 8px rgba(255,107,53,0)}}
.step-text h4{font-size:.9rem;font-weight:700}
.step-text p{font-size:.75rem;color:#aaa}
.drv-card{background:#f6f6f6;border-radius:12px;padding:14px;margin-top:18px;display:flex;align-items:center;gap:14px}
.drv-av{width:44px;height:44px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.drv-info h4{font-size:.9rem;font-weight:700}
.drv-info p{font-size:.78rem;color:#888}
/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:#111;color:#fff;padding:13px 24px;border-radius:12px;font-weight:600;z-index:999;transition:transform .4s;white-space:nowrap;font-size:.88rem}
.toast.show{transform:translateX(-50%) translateY(0)}
/* ORDERS PAGE */
.order-hist{background:#fff;border-radius:14px;border:1px solid #f0f0f0;padding:18px 20px;margin-bottom:12px}
.oh-top{display:flex;justify-content:space-between;margin-bottom:10px}
.oh-id{font-size:.78rem;color:#aaa}
.oh-store{font-weight:700;font-size:.95rem}
.status-chip{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.sc-placed{background:#fff3ee;color:#c54a00}
.sc-accepted{background:#eff6ff;color:#1d4ed8}
.sc-preparing{background:#fffbeb;color:#92400e}
.sc-picked_up{background:#f5f3ff;color:#6d28d9}
.sc-delivered{background:#f0fdf4;color:#15803d}
.sc-cancelled{background:#fff1f2;color:#be123c}
.track-btn{background:#000;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer}
@media(max-width:600px){.store-grid{grid-template-columns:1fr}.cart-drawer{width:100vw}.products-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<nav>
  <div class="logo">Swift<span>ly</span></div>
  <div class="nav-right">
    <div class="lang-mini">
      <button class="lm active" onclick="setLang('en')">EN</button>
      <button class="lm" onclick="setLang('es')">ES</button>
      <button class="lm" onclick="setLang('fr')">FR</button>
      <button class="lm" onclick="setLang('ar')">AR</button>
      <button class="lm" onclick="setLang('hi')">HI</button>
      <button class="lm" onclick="setLang('ml')">ML</button>
    </div>
    <button class="nav-btn" id="tab-home" onclick="showView('home')" data-i18n="nav_home">Home</button>
    <button class="nav-btn" id="tab-orders" onclick="showView('orders')" data-i18n="nav_orders">My Orders</button>
    <a href="/logout"><button class="nav-btn" data-i18n="nav_logout">Log out</button></a>
    <button class="cart-btn" onclick="openCart()">🛒 <span data-i18n="cart">Cart</span> <span class="cart-badge" id="cart-count">0</span></button>
  </div>
</nav>

<!-- HOME VIEW -->
<div id="view-home">
  <div class="hero">
    <div class="hero-inner">
      <h1 data-i18n="hero_title">What are you craving?</h1>
      <p data-i18n="hero_sub">Food, medicine, groceries — delivered fast.</p>
      <div class="search-wrap">
        <input type="text" id="search-input" data-i18n-ph="search_ph" placeholder="Search for stores or items..." oninput="filterStores()">
        <button onclick="filterStores()" data-i18n="search_btn">Search</button>
      </div>
    </div>
  </div>

  <div class="cat-bar">
    <div class="cat-scroll">
      <button class="cat-pill active" onclick="setCat('all',this)" data-i18n="all">All</button>
      <button class="cat-pill" onclick="setCat('food',this)" data-i18n="food">Food</button>
      <button class="cat-pill" onclick="setCat('medicine',this)" data-i18n="medicine">Medicine</button>
      <button class="cat-pill" onclick="setCat('grocery',this)" data-i18n="grocery">Grocery</button>
      <button class="cat-pill" onclick="setCat('general',this)" data-i18n="general">General</button>
    </div>
  </div>

  <main>
    <!-- Store list -->
    <div id="store-list-view">
      <div class="section-title" data-i18n="nearby_stores">Nearby stores</div>
      <div class="store-grid" id="store-grid"></div>
    </div>

    <!-- Store product view -->
    <div class="store-view" id="store-product-view">
      <button class="back-btn" onclick="backToStores()">← <span data-i18n="back">Back to stores</span></button>
      <div class="store-hero">
        <div class="store-hero-emoji" id="sv-emoji"></div>
        <div class="store-hero-info">
          <div class="store-hero-name" id="sv-name"></div>
          <div class="store-hero-meta" id="sv-meta"></div>
        </div>
      </div>
      <div class="section-title" data-i18n="menu">Menu</div>
      <div class="products-grid" id="products-grid"></div>
    </div>
  </main>
</div>

<!-- ORDERS VIEW -->
<div id="view-orders" style="display:none">
  <main>
    <div class="section-title" style="margin-bottom:20px" data-i18n="my_orders">My Orders</div>
    <div id="orders-list"></div>
  </main>
</div>

<!-- CART OVERLAY + DRAWER -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head">
    <h2 data-i18n="your_cart">Your cart</h2>
    <button class="close-x" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot">
    <div class="total-rows">
      <div class="total-row"><span data-i18n="subtotal">Subtotal</span><span id="sub-total">£0.00</span></div>
      <div class="total-row"><span data-i18n="delivery">Delivery</span><span id="del-fee">£0.00</span></div>
      <div class="total-row bold"><span data-i18n="total">Total</span><span id="grand-total">£0.00</span></div>
    </div>
    <button class="checkout-btn" onclick="openCheckout()" data-i18n="checkout">Checkout</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-bg" id="checkout-modal">
  <div class="modal">
    <h2 data-i18n="your_details">Your details</h2>
    <div class="mf"><label data-i18n="delivery_address">Delivery address</label>
      <input type="text" id="c-address" data-i18n-ph="address_ph" placeholder="Enter your full address"></div>
    <div class="mf"><label data-i18n="phone">Phone</label>
      <input type="tel" id="c-phone" data-i18n-ph="phone_ph" placeholder="07700 000000"></div>
    <div class="mf"><label data-i18n="notes">Order notes (optional)</label>
      <textarea id="c-notes" data-i18n-ph="notes_ph" placeholder="e.g. Leave at door, no onions..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeCheckout()" data-i18n="cancel">Cancel</button>
      <button class="btn-pri" onclick="placeOrder()" data-i18n="place_order">Place order</button>
    </div>
  </div>
</div>

<!-- TRACKER MODAL -->
<div class="modal-bg" id="tracker-modal">
  <div class="tracker">
    <div class="tracker-oid" id="t-oid"></div>
    <h2 style="margin-bottom:20px" data-i18n="track_order">Track your order</h2>
    <div class="steps" id="tracker-steps"></div>
    <div class="drv-card" id="drv-card" style="display:none">
      <div class="drv-av">🏍️</div>
      <div class="drv-info"><h4 id="drv-name"></h4><p id="drv-phone"></p></div>
    </div>
    <div class="modal-actions" style="margin-top:20px">
      <button class="btn-sec" onclick="closeTracker()" data-i18n="close">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  ml:{nav_home:'ഹോം',nav_orders:'എന്റെ ഓർഡറുകൾ',nav_logout:'ലോഗ് ഔട്ട്',cart:'കാർട്ട്',hero_title:'ഇന്ന് എന്ത് വേണം?',hero_sub:'ഭക്ഷണം, മരുന്ന്, പലചരക്ക് — വേഗം ഡെലിവറി.',search_ph:'തിരയൂ...',search_btn:'തിരയൂ',all:'എല്ലാം',food:'ഭക്ഷണം',medicine:'മരുന്ന്',grocery:'പലചരക്ക്',general:'പൊതുവായ',nearby_stores:'അടുത്തുള്ള സ്റ്റോറുകൾ',back:'തിരിക്കു',menu:'മെനു',your_cart:'നിങ്ങളുടെ കാർട്ട്',subtotal:'ഉപ-ആകെ',delivery:'ഡെലിവറി',total:'ആകെ',checkout:'ചെക്ക്ഔട്ട്',your_details:'നിങ്ങളുടെ വിവരങ്ങൾ',delivery_address:'ഡെലിവറി വിലാസം',cancel:'റദ്ദാക്കുക',place_order:'ഓർഡർ ചെയ്യുക',track_order:'ഓർഡർ ട്രാക്ക് ചെയ്യൂ',close:'അടയ്ക്കുക',my_orders:'എന്റെ ഓർഡറുകൾ',no_orders:'ഓർഡറുകളൊന്നും ഇല്ല.',mins:'മിനിറ്റ്',open:'തുറന്നിരിക്കുന്നു',closed:'അടഞ്ഞിരിക്കുന്നു'}
};
let lang=localStorage.getItem('sw_lang')||'en';
function t(k){return (T[lang]||T.en)[k]||k;}
function applyLang(){
  const tr=T[lang]||T.en;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(tr[k])el.textContent=tr[k];});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{const k=el.getAttribute('data-i18n-ph');if(tr[k])el.placeholder=tr[k];});
  document.querySelectorAll('.lm').forEach(b=>b.classList.remove('active'));
  const lb=document.querySelector(`.lm[onclick="setLang('${lang}')"]`);if(lb)lb.classList.add('active');
  document.getElementById('html-root').dir=lang==='ar'?'rtl':'ltr';
}
function setLang(l){lang=l;localStorage.setItem('sw_lang',l);applyLang();}

// State
let stores=[],cart=[],currentStore=null,currentCat='all';

// Init
async function init(){await loadStores('all');applyLang();}
async function loadStores(cat){
  const url=cat==='all'?'/api/stores':`/api/stores?category=${cat}`;
  const r=await fetch(url);stores=await r.json();renderStores();
}
function filterStores(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const filtered=q?stores.filter(s=>s.name.toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q)):stores;
  renderStoreGrid(filtered);
}
function renderStores(){renderStoreGrid(stores);}
function renderStoreGrid(list){
  const g=document.getElementById('store-grid');
  if(!list.length){g.innerHTML=`<p style="color:#aaa;padding:40px 0">${t('no_orders')}</p>`;return;}
  g.innerHTML=list.map(s=>`
    <div class="store-card" onclick="openStore(${s.id})">
      <div class="store-cover">
        ${s.image_url?`<img src="${s.image_url}" alt="${s.name}">`:`<span>${s.emoji||'🏪'}</span>`}
        ${s.rating>=4.8?`<span class="store-badge">Top Rated</span>`:''}
      </div>
      <div class="store-info">
        <div class="store-name">${s.name}</div>
        <div class="store-meta">
          <span class="store-rating"><span class="star">★</span>${s.rating||'5.0'}</span>
          <span>⏱ ${s.delivery_time||'20-35'} ${t('mins')}</span>
          <span>🛵 £${(s.delivery_fee||2.99).toFixed(2)}</span>
        </div>
        <div class="store-desc">${s.description||''}</div>
      </div>
    </div>`).join('');
}
async function openStore(sid){
  currentStore=stores.find(s=>s.id===sid);
  if(!currentStore)return;
  document.getElementById('store-list-view').style.display='none';
  document.getElementById('store-product-view').style.display='block';
  document.getElementById('sv-emoji').textContent=currentStore.emoji||'🏪';
  document.getElementById('sv-name').textContent=currentStore.name;
  document.getElementById('sv-meta').innerHTML=`<span class="star">★</span> ${currentStore.rating} &nbsp;·&nbsp; ⏱ ${currentStore.delivery_time} ${t('mins')} &nbsp;·&nbsp; 🛵 £${(currentStore.delivery_fee||2.99).toFixed(2)} ${t('delivery')}<span class="store-open-badge">${t('open')}</span>`;
  const r=await fetch(`/api/stores/${sid}/products`);
  const prods=await r.json();
  document.getElementById('products-grid').innerHTML=prods.map(p=>`
    <div class="product-card">
      <div class="prod-img">${p.image_url?`<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover" alt="${p.name}">`:p.emoji||'📦'}</div>
      <div class="prod-body">
        <div class="prod-name">${p.name}</div>
        <div class="prod-desc">${p.description||''}</div>
        <div class="prod-foot"><span class="prod-price">£${p.price.toFixed(2)}</span>
          <button class="add-btn" onclick="addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">+</button>
        </div>
      </div>
    </div>`).join('');
  window.scrollTo(0,0);
}
function backToStores(){
  document.getElementById('store-list-view').style.display='block';
  document.getElementById('store-product-view').style.display='none';
  currentStore=null;
}
function setCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadStores(cat);
}

// CART
function addToCart(p){
  if(!currentStore){return;}
  // Clear cart if switching stores
  if(cart.length&&cart[0]._store_id!==currentStore.id){cart=[];}
  const ex=cart.find(i=>i.id===p.id);
  if(ex)ex.qty++;
  else cart.push({...p,qty:1,_store_id:currentStore.id});
  updateCartBadge();
  showToast(`${p.emoji||'📦'} ${p.name} added`);
}
function updateCartBadge(){
  document.getElementById('cart-count').textContent=cart.reduce((s,i)=>s+i.qty,0);
}
function openCart(){
  renderCart();
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeCart(){
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function renderCart(){
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const dfee=currentStore?currentStore.delivery_fee:2.99;
  document.getElementById('sub-total').textContent=`£${sub.toFixed(2)}`;
  document.getElementById('del-fee').textContent=`£${dfee.toFixed(2)}`;
  document.getElementById('grand-total').textContent=`£${(sub+dfee).toFixed(2)}`;
  const el=document.getElementById('cart-items');
  if(!cart.length){el.innerHTML=`<div class="cart-empty"><div class="big">🛒</div><p style="margin-top:12px;font-size:.88rem;color:#aaa">${t('your_cart')} is empty</p></div>`;return;}
  el.innerHTML=cart.map(i=>`<div class="cart-item">
    <div class="ci-emoji">${i.emoji||'📦'}</div>
    <div class="ci-info"><div class="ci-name">${i.name}</div><div class="ci-price">£${(i.price*i.qty).toFixed(2)}</div></div>
    <div class="qty-ctrl"><button class="qb" onclick="chgQty(${i.id},-1)">−</button><span style="font-weight:700">${i.qty}</span><button class="qb" onclick="chgQty(${i.id},1)">+</button></div>
  </div>`).join('');
}
function chgQty(id,d){
  const i=cart.findIndex(x=>x.id===id);if(i<0)return;
  cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);
  updateCartBadge();renderCart();
}
function openCheckout(){
  if(!cart.length){showToast('Cart is empty!');return;}
  closeCart();
  document.getElementById('checkout-modal').classList.add('open');
}
function closeCheckout(){document.getElementById('checkout-modal').classList.remove('open');}

async function placeOrder(){
  const addr=document.getElementById('c-address').value.trim();
  const phone=document.getElementById('c-phone').value.trim();
  const notes=document.getElementById('c-notes').value.trim();
  if(!addr){showToast('Please enter your address!');return;}
  if(!currentStore&&cart.length){showToast('Store info missing.');return;}
  const sid=cart[0]?._store_id||currentStore?.id;
  const payload={store_id:sid,address:addr,phone,notes,items:cart.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty,emoji:i.emoji||'📦'}))};
  const r=await fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const data=await r.json();
  if(data.ok){
    closeCheckout();cart=[];updateCartBadge();
    showToast(`Order #${data.order_id} placed! Total £${data.total.toFixed(2)}`);
    setTimeout(()=>trackOrder(data.order_id),1000);
  }
}

// TRACKER
const STATUS_STEPS=[
  {k:'placed',icon:'📋'},
  {k:'accepted',icon:'✅'},
  {k:'preparing',icon:'👨‍🍳'},
  {k:'picked_up',icon:'🏍️'},
  {k:'delivered',icon:'🎉'}
];
async function trackOrder(id){
  const r=await fetch(`/api/orders/${id}`);
  if(!r.ok){showToast('Order not found');return;}
  const o=await r.json();
  const curIdx=STATUS_STEPS.findIndex(s=>s.k===o.status);
  document.getElementById('t-oid').textContent=`Order #${o.id} · ${new Date(o.created_at).toLocaleString()}`;
  document.getElementById('tracker-steps').innerHTML=STATUS_STEPS.map((s,i)=>{
    const cls=i<curIdx?'done':i===curIdx?'active':'';
    return`<div class="step ${cls}">
      <div class="step-dot">${i<curIdx?'✓':s.icon}</div>
      <div class="step-text"><h4>${s.k.replace('_',' ').replace(/^\w/,c=>c.toUpperCase())}</h4><p>${o.status===s.k&&o.store_name?o.store_name:''}</p></div>
    </div>`;
  }).join('');
  const dc=document.getElementById('drv-card');
  if(o.driver_name&&curIdx>=3){
    dc.style.display='flex';
    document.getElementById('drv-name').textContent=o.driver_name+' – Your Driver';
    document.getElementById('drv-phone').textContent=o.driver_phone||'';
  }else{dc.style.display='none';}
  document.getElementById('tracker-modal').classList.add('open');
}
function closeTracker(){document.getElementById('tracker-modal').classList.remove('open');}

// ORDERS VIEW
async function loadMyOrders(){
  const r=await fetch('/api/orders');
  const orders=await r.json();
  const el=document.getElementById('orders-list');
  if(!orders.length){el.innerHTML=`<p style="color:#aaa;padding:40px 0;text-align:center">${t('no_orders')}</p>`;return;}
  el.innerHTML=orders.map(o=>{
    const items=JSON.parse(o.items_json||'[]');
    return`<div class="order-hist">
      <div class="oh-top">
        <div><div class="oh-id">#${o.id} · ${new Date(o.created_at).toLocaleDateString()}</div><div class="oh-store">${o.store_name}</div></div>
        <span class="status-chip sc-${o.status}">${o.status.replace('_',' ')}</span>
      </div>
      <div style="font-size:.8rem;color:#888;margin-bottom:10px">${items.map(i=>`${i.emoji||'📦'} ${i.name} ×${i.qty}`).join(', ')}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>£${o.total.toFixed(2)}</strong>
        ${o.status!=='delivered'&&o.status!=='cancelled'?`<button class="track-btn" onclick="trackOrder(${o.id})" data-i18n="track_order">Track</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function showView(v){
  document.getElementById('view-home').style.display=v==='home'?'block':'none';
  document.getElementById('view-orders').style.display=v==='orders'?'block':'none';
  document.getElementById('tab-home').classList.toggle('active',v==='home');
  document.getElementById('tab-orders').classList.toggle('active',v==='orders');
  if(v==='orders')loadMyOrders();
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
